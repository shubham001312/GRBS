  <div id="update-banner" class="update-banner hidden">
    <span>Updating to latest version...</span>
  </div>

  <script>
    var swRegistration = null;
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('./sw.js').then(function(reg) {
          swRegistration = reg;
          setInterval(function() { if (reg.waiting) { applyUpdate(); } else { reg.update().catch(function(){}); } }, 30 * 60 * 1000);
          reg.addEventListener('updatefound', function() {
            var newSW = reg.installing;
            if (!newSW) return;
            newSW.addEventListener('statechange', function() { if (newSW.state === 'installed' && navigator.serviceWorker.controller) applyUpdate(); });
          });
        }).catch(function(err) { console.warn('SW registration failed:', err); });
      });
      navigator.serviceWorker.addEventListener('message', function(event) {
        if (event.data && event.data.type === 'SW_UPDATED') applyUpdate();
      });
    }
    var _lastReload = 0;
    function applyUpdate() {
      if (Date.now() - _lastReload < 5000) return;
      _lastReload = Date.now();
      if (swRegistration && swRegistration.waiting) {
        swRegistration.waiting.postMessage({ type: 'SKIP_WAITING' });
      }
    }
    navigator.serviceWorker.addEventListener('controllerchange', function() {
      if (Date.now() - _lastReload < 5000) return;
      _lastReload = Date.now();
      window.location.reload();
    });
    var offlineBanner = document.getElementById('offline-banner');
    function updateOnlineStatus() { if (navigator.onLine) offlineBanner.classList.add('hidden'); else offlineBanner.classList.remove('hidden'); }
    window.addEventListener('online', updateOnlineStatus);
    window.addEventListener('offline', updateOnlineStatus);
    updateOnlineStatus();
  </script>
