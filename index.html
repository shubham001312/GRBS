<!-- Version: 2.0 | Last Updated: June 9, 2026 -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#F7F4EF">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>GRBS — GPT Roadmap By Shubham</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&family=Lora:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
</head>
<body>

  <!-- Username Modal (Onboarding) -->
  <div class="modal-overlay hidden" id="username-modal">
    <div class="modal-card">
      <h2>Welcome to GRBS 👋</h2>
      <p class="modal-sub">What should we call you? (used only on this device)</p>
      <input type="text" id="username-input" placeholder="Your first name" autocomplete="off">
      <div class="modal-error" id="modal-error"></div>
      <button class="btn-primary" id="modal-submit">Let's go →</button>
    </div>
  </div>

  <!-- Header -->
  <header class="app-header">
    <div class="logo">⚡ GRBS</div>
    <div class="header-actions">
      <span class="phase-indicator" id="current-phase">Phase 0</span>
      <span class="sync-indicator" id="sync-indicator">🟢 Saved</span>
      <button id="btn-theme" class="icon-btn" onclick="toggleTheme()" title="Toggle theme">🌙</button>
    </div>
  </header>

  <!-- Search -->
  <div class="search-container" id="search-container">
    <input type="text" id="search-input" class="search-input" placeholder="🔍 Search topics, projects..." autocomplete="off">
    <div class="search-results hidden" id="search-results"></div>
  </div>

  <!-- Tab Content (JS fills these) -->
  <main id="app-content" style="display:none;">
    <div id="tab-dashboard" class="tab-content active"></div>
    <div id="tab-roadmap" class="tab-content"></div>
    <div id="tab-projects" class="tab-content"></div>
    <div id="tab-progress" class="tab-content"></div>
    <div id="tab-goals" class="tab-content"></div>
  </main>

  <!-- Bottom Nav -->
  <nav class="bottom-nav" id="app-nav" style="display:none;">
    <button class="nav-item active" data-tab="dashboard">
      <span class="nav-icon">📊</span>
      <span class="nav-label">Dashboard</span>
    </button>
    <button class="nav-item" data-tab="roadmap">
      <span class="nav-icon">🗺️</span>
      <span class="nav-label">Roadmap</span>
    </button>
    <button class="nav-item" data-tab="projects">
      <span class="nav-icon">🏗️</span>
      <span class="nav-label">Projects</span>
    </button>
    <button class="nav-item" data-tab="progress">
      <span class="nav-icon">📈</span>
      <span class="nav-label">Progress</span>
    </button>
    <button class="nav-item" data-tab="goals">
      <span class="nav-icon">🎯</span>
      <span class="nav-label">Goals</span>
    </button>
  </nav>

  <!-- Toast Container -->
  <div id="toast-container"></div>

  <!-- JS (load order matters) -->
  <script src="js/data.js"></script>
  <script src="js/state.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/roadmap.js"></script>
  <script src="js/projects.js"></script>
  <script src="js/progress.js"></script>
  <script src="js/goals.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
